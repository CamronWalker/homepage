<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Camron Walker — Hero Directions</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Mulish:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Caveat:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="camron.css">
<style>
  html,body{margin:0;height:100%;}
  #root{height:100vh;}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="heroes.js"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel">
const { useRef } = React;
function Frame({ html }) {
  return <div style={{width:1280, height:800}} dangerouslySetInnerHTML={{__html: html}} />;
}
function App() {
  return (
    <DesignCanvas>
      <DCSection id="heroes" title="camronwalker.com — Hero directions" subtitle="Same brand (graphite pencil + Camron Blue), three layouts. Open any one fullscreen with the focus button.">
        <DCArtboard id="a" label="A · Flight Path — airy & minimal" width={1280} height={800}>
          <Frame html={window.HEROES.HERO_A} />
        </DCArtboard>
        <DCArtboard id="b" label="B · Blueprint Margin — graph paper + handwritten notes + rocket launch" width={1280} height={800}>
          <Frame html={window.HEROES.HERO_B} />
        </DCArtboard>
        <DCArtboard id="c" label="C · Editorial Split — bold type + drafting panel" width={1280} height={800}>
          <Frame html={window.HEROES.HERO_C} />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
