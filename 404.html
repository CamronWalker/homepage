<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Camron Walker</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    min-height: 100vh;
    background-color: #FAF9F6;
    background-image:
      linear-gradient(#ECEEF1 1px, transparent 1px),
      linear-gradient(90deg, #ECEEF1 1px, transparent 1px);
    background-size: 30px 30px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Space Grotesk', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .wrap {
    text-align: center;
    padding: 40px 24px;
    max-width: 480px;
  }
  .big-num {
    font-family: 'Space Grotesk', system-ui, sans-serif;
    font-weight: 700;
    font-size: clamp(96px, 22vw, 160px);
    line-height: 1;
    color: #1C1E22;
    letter-spacing: -.04em;
    margin: 0 0 8px;
  }
  .hand-note {
    font-family: 'Caveat', cursive;
    font-size: clamp(22px, 5vw, 30px);
    color: #1093C9;
    transform: rotate(-2deg);
    display: inline-block;
    margin-bottom: 36px;
  }
  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: 'Space Grotesk', system-ui, sans-serif;
    font-weight: 600;
    font-size: 15px;
    color: #FAF9F6;
    background: #1C1E22;
    border: 1.5px solid #1C1E22;
    border-radius: 4px;
    padding: 13px 20px;
    text-decoration: none;
    transition: background .2s ease, border-color .2s ease;
  }
  .back-link:hover {
    background: #0B6E97;
    border-color: #0B6E97;
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="big-num">404</div>
    <div class="hand-note">looks like this one drifted off course</div>
    <br>
    <a class="back-link" href="/">&larr; back to the pad</a>
  </div>
</body>
</html>
