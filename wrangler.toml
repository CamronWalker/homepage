# Cloudflare Worker — serves the built static site from ./dist.
#
# Connected to GitHub via Workers Builds: a push to `main` runs the build
# command (`npm run build`) and then the deploy command (`npx wrangler deploy`),
# and this Worker serves the result at camronwalker.com.
name = "camronwalker-homepage"
compatibility_date = "2024-11-01"

# Static assets only — no server code needed. Unknown paths fall back to the
# custom 404 page that the build emits at dist/404.html.
[assets]
directory = "./dist"
not_found_handling = "404-page"
